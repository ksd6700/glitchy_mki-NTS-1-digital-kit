name: Build logue SDK units

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Test portable DSP
        run: ./scripts/test.sh

      - name: Fetch pinned KORG logue SDK
        run: ./scripts/fetch-sdk.sh

      - name: Build all supported synth targets
        env:
          BUILD_MODE: docker
        run: ./scripts/build.sh all

      - name: Package units
        run: ./scripts/package.sh "${GITHUB_REF_NAME}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: glitchy-${{ github.ref_name }}
          path: dist/${{ github.ref_name }}/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          dist/${GITHUB_REF_NAME}/*
          --title "Glitchy ${GITHUB_REF_NAME}"
          --notes "Ready-to-load Glitchy modulation effect units for NTS-1 digital kit mkI, minilogue xd, prologue, NTS-1 digital kit mkII, and microKORG2."
